services:
  gurukul:
    build: .
    container_name: gurukul-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SQLITE_JOURNAL_MODE=DELETE
    volumes:
      - gurukul-db:/app/db
      - ./config:/app/config
      - ./.env:/app/.env

volumes:
  gurukul-db:
